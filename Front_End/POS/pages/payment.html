<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Claim Payment</title>
    <link rel="stylesheet" href="../css/payment.css">
</head>
<body>

<h2>Insurance Claim Payment</h2>

<form id="paymentForm" method="post" action="https://sandbox.payhere.lk/pay/checkout">


    <input type="hidden" name="merchant_id" value="1234715">

    <input type="hidden" name="return_url" value="https://YOUR_PUBLIC_URL/success.html">
    <input type="hidden" name="cancel_url" value="https://YOUR_PUBLIC_URL/cancel.html">
    <input type="hidden" name="notify_url" value="https://YOUR_PUBLIC_URL/api/payment/notify">


    <input type="hidden" name="order_id" value="">
    <input type="hidden" name="items" value="Insurance Claim Payment">
    <input type="hidden" name="currency" value="LKR">
    <input type="hidden" name="amount" value="5000.00">


    <input type="hidden" name="first_name" value="Pasindu">
    <input type="hidden" name="last_name" value="Madushan">
    <input type="hidden" name="email" value="test@gmail.com">
    <input type="hidden" name="phone" value="0771234567">
    <input type="hidden" name="address" value="Colombo">
    <input type="hidden" name="city" value="Colombo">
    <input type="hidden" name="country" value="Sri Lanka">

    <button type="submit">Pay Now</button>
</form>

<script>
    // ✅ Generate a unique order ID every time form loads
    document.querySelector('input[name="order_id"]').value = "CLAIM" + Date.now();
</script>

</body>
</html>
