<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment</title>
    <link rel="stylesheet" href="../css/payment.css">
</head>
<body>

<a href="../../index.html" class="back-circle-btn">←</a>

<div class="container">
    <div class="payment-card">

        <h2>🔒 Secure Payment</h2>

        <!-- Claim Details -->
        <div class="section">
            <label>ID</label>
            <input type="text" id="claimId" placeholder="Registered ID">

            <label>Amount (LKR)</label>
            <input type="number" id="amount" placeholder="Enter Amount">
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('card')">Card</button>
            <button class="tab" onclick="showTab('cash')">Cash</button>
        </div>

        <!-- CARD TAB -->
        <div id="cardTab" class="tab-content active">

            <div class="section">

                <!-- Logos -->
                <div class="card-logos">
                    <img src="https://img.icons8.com/color/48/visa.png"/>
                    <img src="https://img.icons8.com/color/48/mastercard.png"/>
                    <img src="https://img.icons8.com/color/48/amex.png"/>
                    <img src="https://img.icons8.com/color/48/discover.png"/>
                    <img src="https://img.icons8.com/color/48/maestro.png"/>
                </div>

                <label>Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">

                <div class="row">
                    <div>
                        <label>Expiry</label>
                        <input type="text" id="expiry" placeholder="MM/YY">
                    </div>
                    <div>
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123">
                    </div>
                </div>

            </div>

            <button class="pay-btn" onclick="payCard()">Pay Now</button>

        </div>

        <!-- CASH TAB -->
        <div id="cashTab" class="tab-content">

            <p class="info">
                Pay at our office and confirm your payment.
            </p>

            <button class="cash-btn" onclick="payCash()">Confirm Cash Payment</button>

        </div>

    </div>
</div>

<script src="../js/payment.js"></script>
</body>
</html>
