<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Life Insurance</title>
    <link rel="stylesheet" href="../css/life.css">
</head>
<body>

<div class="container">

    <h2>Life Insurance Form</h2>

    <h3>Policy Number</h3>
    <input type="text" id="policyNo" readonly>

    <h3>Personal Details</h3>
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="text" id="nic" placeholder="NIC">
    <select id="gender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select> <input type="date" id="dob">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="address" placeholder="Address">

    <h3>Health Details</h3>
    <input type="number" id="height" placeholder="Height">
    <input type="number" id="weight" placeholder="Weight">

    <label>Smoker</label><br>
    <input type="radio" name="smoker" value="true"> Yes
    <input type="radio" name="smoker" value="false"> No

    <input type="text" id="diseases" placeholder="Diseases">

    <h3>Policy Details</h3>
    <input type="number" id="sumAssured" placeholder="Sum Assured">
    <input type="number" id="policyTerm" placeholder="Policy Term">
    <input type="number" id="monthlyPremium" placeholder="Monthly Premium">
    <input type="date" id="policyStart">

    <select id="plan">
        <option value="">Select Plan</option>
        <option>Basic</option>
        <option>Premium</option>
    </select>

    <button onclick="saveLifePolicy()">Submit</button>

    <script src="../js/life.js"></script>
</body>
</html>
