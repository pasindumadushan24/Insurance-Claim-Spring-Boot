<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Management | ProtectAll</title>

    <link rel="stylesheet" href="../css/customer.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<nav style="padding:20px;">
    <a href="../pages/dashboard.html" class="back-link">← Back</a>
</nav>

<div class="customer-container">

    <!-- ================= FORM ================= -->
    <div class="form-card">

        <h3 id="formTitle">Add Insurance Policy</h3>

        <form id="insuranceForm">

            <!-- Hidden ID (for update) -->
            <input type="hidden" id="insuranceId">

            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="custName" placeholder="Enter Full Name" required>
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" id="custContact" placeholder="07xxxxxxxx" required>
            </div>

            <div class="input-group">
                <label>Policy Number</label>
                <input type="text" id="policyNo" placeholder="POL001" required>
            </div>

            <div class="input-group">
                <label>Insurance Type</label>
                <select id="insuranceType">
                    <option value="Vehicle">Vehicle Insurance</option>
                    <option value="Life">Life Insurance</option>
                    <option value="Home">Home Insurance</option>
                    <option value="Pet">Pet Insurance</option>
                </select>
            </div>

            <div class="input-group">
                <label>Premium Amount (LKR)</label>
                <input type="number" id="premium" placeholder="e.g. 5000">
            </div>

            <div class="input-group">
                <label>Start Date</label>
                <input type="date" id="startDate">
            </div>

            <div class="input-group">
                <label>End Date</label>
                <input type="date" id="endDate">
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Add Policy</button>

        </form>
    </div>

    <!-- ================= TABLE ================= -->
    <div class="table-card">

        <h3>Insurance Policies</h3>

        <div class="filter-buttons">
            <button onclick="loadPolicies()" class="filter-btn active">All</button>
            <button onclick="loadByType('Life')" class="filter-btn">Life</button>
            <button onclick="loadByType('Vehicle')" class="filter-btn">Vehicle</button>
            <button onclick="loadByType('Home')" class="filter-btn">Home</button>
        </div>

        <table id="customerTable">
            <thead>
            <tr>
                <th>Name</th>
                <th>Policy No</th>
                <th>Type</th>
                <th>Premium</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="insuranceTableBody">
            <!-- JS will load data here -->
            </tbody>

        </table>

    </div>

</div>

<script src="../js/insurance.js"></script>

</body>
</html>
