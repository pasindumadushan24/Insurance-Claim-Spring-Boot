<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ProtectAll</title>
  <link rel="stylesheet" href="../css/customer.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<nav style="padding: 20px;">
  <a href="../pages/dashboard.html" class="back-link">← Back</a>
</nav>

<div class="customer-container">
</div>


<body>
<div class="customer-container">
  <div class="form-card">
    <h3>Add New Customer</h3>
    <form id="customerForm">
      <div class="input-group">
        <label>Customer Name</label>
        <input type="text" id="custName" placeholder="Enter Full Name" required>
      </div>
      <div class="input-group">
        <label>Address</label>
        <input type="text" id="custAddress" placeholder="City, Street" required>
      </div>
      <div class="input-group">
        <label>Contact Number</label>
        <input type="text" id="custContact" placeholder="07xxxxxxxx" required>
      </div>
      <div class="input-group">
        <label>Insurance Type</label>
        <select id="insuranceType">
          <option value="Vehicle">Vehicle Insurance</option>
          <option value="Life">Life Insurance</option>
          <option value="Home">Home Insurance</option>
          <option value="Pet">Pet Insurance</option>
        </select>
      </div>
      <button type="submit" class="auth-btn">Save Customer</button>
    </form>
  </div>

  <div class="table-card">
    <h3>Active Policy Holders</h3>
    <table id="customerTable">
      <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Policy No</th>
        <th>Action</th>
      </tr>

      </thead>
      <tbody id="customerTableBody">
      </tbody>
    </table>
  </div>

</div>

<script src="../js/customer.js"></script>
</body>
</html>
