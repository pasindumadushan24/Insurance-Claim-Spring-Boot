<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Place Order</title>
  <link rel="stylesheet" href="../css/order-style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">POS System</div>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a href="Customer.html">Customer</a>
    <a href="Item.html">Item</a>
    <a class="active" href="Order.html">Order</a>
  </div>
</nav>

<main class="container">

  <h1>Place Order</h1>

  <!-- Customer Selection -->
  <div class="card">
    <h2>Select Customer</h2>
    <select id="order-customer"></select>
  </div>

  <!-- Item Section -->
  <div class="card">
    <h2>Add Items</h2>

    <table id="order-item-table">
      <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Qty</th>
<!--        <th>Sub Total</th>-->
        <th></th>
      </tr>
      </thead>
      <tbody id="order-item-list"></tbody>

    </table>

    <div class="actions">
      <button class="btn primary" onclick="addItemRow()">Add Row</button>
      <button class="btn danger" onclick="clearItems()">Clear</button>
    </div>
  </div>

  <div class="card summary">
    <h2>Order Summary</h2>

    <div class="summary-grid">
      <div>
        <label>Order ID</label>
        <div id="order-id" class="value">-</div>
      </div>

      <div>
        <label>Total Amount (LKR)</label>
        <div id="order-total" class="value">-</div>
      </div>

      <div>
        <label>Order Date</label>
        <input type="date" id="order-date">
      </div>
    </div>

    <button class="btn primary place-order" onclick="saveOrder()">Save Order</button>
  </div>

  <!-- Order List -->
  <div class="card">
    <h2>Order History</h2>


    <table id="order-list">
      <thead>
      <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>CID</th>
<!--        <th>Total</th>-->
      </tr>
      </thead>
      <tbody id="order-history-list"></tbody>
    </table>
  </div>

</main>

<script src="../jquery-3.7.1.min.js"></script>
<script src="../js/place_order.js"></script>
</body>
</html>
