<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtectAll Insurance | Help Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .help-form-card, .table-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;
        }
        .submit-btn { padding: 10px 20px; background: #f39c12; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        .submit-btn:hover { background: #e67e22; }

        table { width: 100%; border-collapse: collapse; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 10px; text-align: left; }
        th { background: #f39c12; color: #fff; }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Submitted Requests</h2>
    <table id="requestsTable">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Product</th>
        </tr>
        </thead>
        <tbody>
        <!-- Data will appear here -->
        </tbody>
    </table>
</div>

<script src="../js/youHelp.js"></script>
</body>
</html>
