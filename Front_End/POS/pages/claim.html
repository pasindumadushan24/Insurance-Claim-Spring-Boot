<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Claim</title>
    <link rel="stylesheet" href="../css/claim.css">
</head>
<body>

<a href="../../index.html" class="back-circle-btn">←</a>

<div class="container">

    <!-- LEFT FORM -->
    <div class="form-box">
        <form id="claimForm" enctype="multipart/form-data">

            <select id="product" required>
                <option value="">Select Product</option>
                <option value="Vehicle">Vehicle Insurance</option>
                <option value="Home">Home Insurance</option>
                <option value="Life">Life Insurance</option>
            </select>

            <input type="text" placeholder="Policy Number" id="policyNo" required>
            <input type="text" placeholder="Full Name" id="name" required>
            <input type="text" placeholder="Contact Number" id="mobile" required>
            <input type="email" placeholder="Email Address" id="email" required>

            <input type="file" id="file" accept="image/*" required>

            <img id="preview" style="display:none; width:100%; border-radius:10px; margin-bottom:10px;">

            <textarea placeholder="Describe your claim..." id="message"></textarea>

            <label class="check">
                <input type="checkbox" required> I agree to terms
            </label>

            <button type="submit">Submit Claim ➜</button>
        </form>

        <p id="msg" style="margin-top:10px; color:#fff176; font-weight:bold;"></p>
    </div>

    <!-- RIGHT TEXT -->
    <div class="text-box">
        <h1>Need to Make a Claim?</h1>
        <h2>We are Here to Help.</h2>
        <p>Upload your documents and we will contact you soon.</p>
    </div>

</div>

<script src="../js/claim.js"></script>

</body>
</html>
