<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management</title>
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">POS System</div>
    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a class="active" href="Customer.html">Customer</a>
        <a href="Item.html">Item</a>
        <a href="Order.html">Order</a>
    </div>
</nav>

<main class="container">

    <h1>Customer Management</h1>

    <!-- Customer Form -->
    <div class="card">
        <h2>Customer Details</h2>
        <form class="form">
            <input type="text" id="cid" placeholder="Customer ID" readonly>
            <input type="text" id="name" placeholder="Customer Name">
            <input type="text" id="address" placeholder="Customer Address">
        </form>

        <div class="actions">
            <button type="button" class="btn primary" onclick="saveCustomer()">Save</button>
            <button type="button" class="btn warning" onclick="updateCustomer()">Update</button>
            <button type="button" class="btn danger" onclick="deleteCustomer()">Delete</button>
        </div>
    </div>

    <table id="customer-table">
        <thead>
        <tr>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Address</th>
        </tr>
        </thead>
        <tbody id="customer-list">
        <!-- JS will fill rows here -->
        </tbody>
    </table>



</main>

<script src="../jquery-3.7.1.min.js"></script>
<script src="../js/customer.js"></script>
</body>
</html>
